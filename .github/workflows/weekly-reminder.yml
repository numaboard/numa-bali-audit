name: Weekly Check-in Reminder

on:
  schedule:
    # Monday 7:00 AM Bali time (UTC+8) = Sunday 23:00 UTC
    - cron: '0 23 * * 0'
    # Tuesday 7:00 AM Bali = Monday 23:00 UTC
    - cron: '0 23 * * 1'
    # Wednesday 7:00 AM Bali = Tuesday 23:00 UTC
    - cron: '0 23 * * 2'
  workflow_dispatch: # allow manual trigger for testing

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Check if manager submitted this week and send reminder
        run: |
          python3 << 'PYEOF'
          import urllib.request, urllib.parse, json, os
          from datetime import datetime, timezone, timedelta

          TG_TOKEN = os.environ['TG_TOKEN']
          TG_GROUP_ID = os.environ['TG_GROUP_ID']
          SB_URL = os.environ['SUPABASE_URL']
          SB_KEY = os.environ['SUPABASE_KEY']

          # Get current week number (Bali time UTC+8)
          bali_tz = timezone(timedelta(hours=8))
          now_bali = datetime.now(bali_tz)
          week_number = now_bali.isocalendar()[1]
          weekday = now_bali.weekday()  # 0=Monday, 1=Tuesday, 2=Wednesday

          print(f"Bali time: {now_bali.strftime('%A %d %B %Y %H:%M')}")
          print(f"Week number: {week_number}, Weekday: {weekday}")

          # Check if manager already submitted this week via Supabase REST API
          query = f"?week_number=eq.{week_number}&select=id"
          url = f"{SB_URL}/rest/v1/weekly_checkins{query}"
          req = urllib.request.Request(url, headers={
              'apikey': SB_KEY,
              'Authorization': f'Bearer {SB_KEY}',
              'Content-Type': 'application/json'
          })

          try:
              resp = urllib.request.urlopen(req)
              data = json.loads(resp.read())
              already_submitted = len(data) > 0
          except Exception as e:
              print(f"Supabase check failed: {e}")
              already_submitted = False

          print(f"Already submitted this week: {already_submitted}")

          if already_submitted:
              print("Manager already submitted — no reminder needed.")
              exit(0)

          # Build reminder message based on which day it is
          if weekday == 0:  # Monday
              emoji = "📋"
              urgency = "new week"
              msg = (
                  f"{emoji} <b>Weekly Check-in — Week {week_number}</b>\n\n"
                  f"Halo! 👋 It's Monday — time for your weekly property check-in.\n\n"
                  f"🔗 Open the app and complete your <b>29 items</b> for this week.\n"
                  f"It takes about 5 minutes.\n\n"
                  f"<a href='https://numaboard.github.io/numa-bali-audit'>→ Open NUMA Bali Audit</a>"
              )
          elif weekday == 1:  # Tuesday
              emoji = "⚠️"
              msg = (
                  f"{emoji} <b>Reminder — Weekly Check-in not yet submitted</b>\n\n"
                  f"The week {week_number} check-in is still pending.\n"
                  f"Please complete it today — it only takes 5 minutes!\n\n"
                  f"<a href='https://numaboard.github.io/numa-bali-audit'>→ Open NUMA Bali Audit</a>"
              )
          elif weekday == 2:  # Wednesday — final reminder
              emoji = "🔴"
              msg = (
                  f"{emoji} <b>Final Reminder — Week {week_number} Check-in</b>\n\n"
                  f"This is the last reminder for this week's check-in.\n"
                  f"Please submit it today so management can track property status.\n\n"
                  f"<a href='https://numaboard.github.io/numa-bali-audit'>→ Open NUMA Bali Audit</a>"
              )
          else:
              print(f"Not a reminder day (weekday={weekday}), skipping.")
              exit(0)

          # Send to Telegram group
          tg_url = f"https://api.telegram.org/bot{TG_TOKEN}/sendMessage"
          payload = json.dumps({
              'chat_id': TG_GROUP_ID,
              'text': msg,
              'parse_mode': 'HTML',
              'disable_web_page_preview': False
          }).encode()

          req2 = urllib.request.Request(tg_url, data=payload,
              headers={'Content-Type': 'application/json'})
          resp2 = urllib.request.urlopen(req2)
          result = json.loads(resp2.read())

          if result.get('ok'):
              print(f"✓ Reminder sent to group (day {weekday+1}/3)")
          else:
              print(f"✗ Telegram error: {result}")
              exit(1)

          PYEOF
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_GROUP_ID: ${{ secrets.TG_GROUP_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
